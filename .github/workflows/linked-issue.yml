name: Linked Issue

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: linked-issue-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-linked-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Validate linked issue reference
        shell: bash
        run: |
          python - <<'PY'
          import json, os, re, sys

          with open(os.environ['GITHUB_EVENT_PATH'], encoding='utf-8') as handle:
              event = json.load(handle)

          pr = event['pull_request']
          title = (pr.get('title') or '').strip()
          body = pr.get('body') or ''
          author = ((pr.get('user') or {}).get('login') or '').strip()
          labels = {label.get('name') for label in pr.get('labels', []) if label.get('name')}

          bypass_label = 'no-linked-issue-required'
          bot_authors = {'dependabot[bot]', 'renovate[bot]', 'github-actions[bot]'}
          patterns = (
              re.compile(r'(?i)\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?|ref(?:erence)?s?|see)\s*:?\s+(?:[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+)?#\d+\b'),
              re.compile(r'(?i)https://github\.com/[^/\s]+/[^/\s]+/issues/\d+\b'),
              re.compile(r'(?<![/\w])#\d+\b'),
          )
          text = '\n'.join(part for part in (title, body) if part)

          if author in bot_authors:
              print(f"Skipping linked-issue enforcement for bot author '{author}'.")
              sys.exit(0)

          if bypass_label in labels:
              print(f"Bypass label '{bypass_label}' is present.")
              sys.exit(0)

          if any(pattern.search(text) for pattern in patterns):
              print('Linked issue reference found.')
              sys.exit(0)

          print(
              "Missing linked issue reference. Add an issue link such as 'Closes #123' to the PR title or body, "
              f"or apply the '{bypass_label}' label.",
              file=sys.stderr,
          )
          sys.exit(1)
          PY
